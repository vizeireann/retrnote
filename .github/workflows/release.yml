name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write  # Needed to attach assets to the release

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      binary_path: ${{ steps.build.outputs.binary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build macOS binary
        id: build
        run: |
          pyinstaller --onefile --name retrnote-macos-latest --strip --clean src/retrnote/cli.py
          echo "binary=dist/retrnote-macos-latest" >> $GITHUB_OUTPUT

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-macos-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs: build-macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name retrnote-linux-latest --strip --clean src/retrnote/cli.py

      - name: Upload Linux binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-linux-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build Windows binary
        run: pyinstaller --onefile --name retrnote-windows-latest --clean src\retrnote\cli.py

      - name: Upload Windows binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-windows-latest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
