name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write  # required for GH actions, PAT used for multi-job upload

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install . pyinstaller

      - name: Build macOS binary
        run: pyinstaller --onefile --name retrnote-macos-latest --strip --clean src/retrnote/cli.py

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-macos-latest

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install . pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name retrnote-linux-latest --strip --clean src/retrnote/cli.py

      - name: Upload Linux binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-linux-latest

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install . pyinstaller

      - name: Build Windows binary
        run: pyinstaller --onefile --name retrnote-windows-latest --clean src\retrnote\cli.py

      - name: Upload Windows binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-windows-latest.exe
