name: Build and Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write   # Needed to attach assets to the release

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build macOS binary
        run: pyinstaller --onefile --name retrnote-macos-latest --strip --clean src/retrnote/cli.py

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/retrnote-macos-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name retrnote-linux-latest --strip --clean src/retrnote/cli.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrnote-linux
          path: dist/retrnote-linux-latest

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies and PyInstaller
        run: pip install . pyinstaller

      - name: Build Windows binary
        run: pyinstaller --onefile --name retrnote-windows-latest --clean src\retrnote\cli.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrnote-windows
          path: dist/retrnote-windows-latest.exe
